name: Create Release

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'

jobs:
  release:
    name: Tag & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git rev-parse "v${{ steps.pkg.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create git tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.pkg.outputs.version }}"
          git push origin "v${{ steps.pkg.outputs.version }}"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: Release v${{ steps.pkg.outputs.version }}
          body: |
            ## Archivio Mastro Sculture – v${{ steps.pkg.outputs.version }}

            Deploy automatico generato da GitHub Actions.

            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}

            Vedi [CHANGELOG.md](https://github.com/vitouchiha/archivio-mastro-sculture/blob/main/CHANGELOG.md) per i dettagli delle modifiche.
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update CHANGELOG.md with release date
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          DATE=$(date +%Y-%m-%d)
          VERSION="${{ steps.pkg.outputs.version }}"
          # Replace [Unreleased] section header with versioned entry
          sed -i "s/^## \[Unreleased\]/## [Unreleased]\n\n---\n\n## [${VERSION}] – ${DATE}/" CHANGELOG.md || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore: update CHANGELOG for v${VERSION} [skip ci]"
          git push origin main
